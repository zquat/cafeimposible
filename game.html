// ═══════════════════════════════════════════════════════
//  ISO MATH
// ═══════════════════════════════════════════════════════
function iso(gx,gy,gz,ox,oy){
  return { x: ox+(gx-gy)*(TW/2), y: oy+(gx+gy)*(TH/2)-gz*ZS };
}
function hitTile(px,py,gx,gy,gz,ox,oy){
  const c=iso(gx,gy,gz,ox,oy);
  return Math.abs((px-c.x)/(TW/2))+Math.abs((py-c.y)/(TH/2))<=1;
}

// ═══════════════════════════════════════════════════════
//  CONNECTIVITY GRAPH
// ═══════════════════════════════════════════════════════
class Graph {
  constructor(){ this.e={}; }
  k(x,y){ return x+','+y; }
  link(x1,y1,x2,y2){
    const a=this.k(x1,y1),b=this.k(x2,y2);
    (this.e[a]=this.e[a]||new Set()).add(b);
    (this.e[b]=this.e[b]||new Set()).add(a);
  }
  bfs(sx,sy,gx,gy){
    const s=this.k(sx,sy),g=this.k(gx,gy);
    if(s===g)return[];
    const seen=new Set([s]),q=[[s,[s]]];
    while(q.length){
      const[cur,path]=q.shift();
      for(const nb of(this.e[cur]||[])){
        if(nb===g)return[...path,g].map(k=>{const[x,y]=k.split(',');return{x:+x,y:+y};});
        if(!seen.has(nb)){seen.add(nb);q.push([nb,[...path,nb]]);}
      }
    }
    return null;
  }
}

// ═══════════════════════════════════════════════════════
//  GRAPH BUILDER
// ═══════════════════════════════════════════════════════
function buildGraph(level){
  const g=new Graph();
  for(const sec of level.sections){
    const rot=sec.currentRotation||0;
    const block=(sec.connections||[]).find(c=>c.rotation===rot);
    if(!block)continue;
    for(const lk of block.links) g.link(lk.f.x,lk.f.y,lk.t.x,lk.t.y);
  }
  return g;
}

function effTile(tile,sec){
  return{...tile,z:(tile.z||0)+(sec.zOffset||0)};
}

// ═══════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W=0,H=0,OX=0,OY=0;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  recomputeOrigin();
  render();
}
window.addEventListener('resize',resize);

function recomputeOrigin(){
  if(!game.level)return;
  const lv=game.level;
  const mcx=(lv.playerStart.x+lv.goal.x)/2;
  const mcy=(lv.playerStart.y+lv.goal.y)/2;
  const sc=iso(mcx,mcy,0,0,0);
  OX=W/2-sc.x;
  OY=H/2-sc.y+H*0.04;
}

// ═══════════════════════════════════════════════════════
//  DRAWING HELPERS
// ═══════════════════════════════════════════════════════

// Draw one iso block using explicit colour strings
function drawBlockColored(gx,gy,gz,palT,palL,palR,alpha){
  const{x:sx,y:sy}=iso(gx,gy,gz,OX,OY);
  const hw=TW/2,hh=TH/2,depth=TD;
  if(alpha!==undefined&&alpha!==1){ctx.globalAlpha=alpha;}

  ctx.fillStyle=palT;
  ctx.beginPath();ctx.moveTo(sx,sy-hh);ctx.lineTo(sx+hw,sy);
  ctx.lineTo(sx,sy+hh);ctx.lineTo(sx-hw,sy);ctx.closePath();ctx.fill();

  ctx.fillStyle=palL;
  ctx.beginPath();ctx.moveTo(sx-hw,sy);ctx.lineTo(sx,sy+hh);
  ctx.lineTo(sx,sy+hh+depth);ctx.lineTo(sx-hw,sy+depth);ctx.closePath();ctx.fill();

  ctx.fillStyle=palR;
  ctx.beginPath();ctx.moveTo(sx,sy+hh);ctx.lineTo(sx+hw,sy);
  ctx.lineTo(sx+hw,sy+depth);ctx.lineTo(sx,sy+hh+depth);ctx.closePath();ctx.fill();

  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(sx,sy-hh);ctx.lineTo(sx+hw,sy);
  ctx.lineTo(sx,sy+hh);ctx.lineTo(sx-hw,sy);ctx.closePath();ctx.stroke();

  if(alpha!==undefined&&alpha!==1)ctx.globalAlpha=1;
}

// Choose palette for a tile given section index and tile type
function palFor(secIdx,tileType,hovered){
  if(tileType==='goal')  return[GOAL_PAL.t, GOAL_PAL.l, GOAL_PAL.r];
  if(tileType==='wall')  return[WALL_PAL.t, WALL_PAL.l, WALL_PAL.r];
  const p=SEC_PALETTES[secIdx%SEC_PALETTES.length];
  if(hovered) return[HOVER_TOP, p.l, p.r];
  return[p.t, p.l, p.r];
}

function drawBtn(cx,cy,label,hovered,color){
  ctx.fillStyle=hovered?'rgba(200,169,122,.38)':'rgba(200,169,122,.18)';
  ctx.strokeStyle=color||'#c8a97a'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle=color||'#c8a97a';
  ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,cx,cy+1);
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function drawPlayer(sx,sy,bobY){
  const py=sy+(bobY||0);
  ctx.fillStyle='rgba(58,40,16,.28)';
  ctx.beginPath();ctx.ellipse(sx,sy+TH/2-4,TW*.28,TH*.18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8a6e4f';
  ctx.fillRect(sx-6,py-4,5,13);ctx.fillRect(sx+1,py-4,5,13);
  ctx.fillStyle='#e8e0d4';
  roundRect(ctx,sx-9,py-24,18,20,4);ctx.fill();
  ctx.fillStyle='#f0d8b8';
  ctx.beginPath();ctx.arc(sx,py-32,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2810';
  ctx.beginPath();ctx.arc(sx-3,py-33,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+3,py-33,2,0,Math.PI*2);ctx.fill();
}

// ═══════════════════════════════════════════════════════
//  RENDER SECTION TO OFFSCREEN CANVAS
//  Used both for normal drawing and rotation animation.
//  Returns {offscreen, pivotScreenX, pivotScreenY}
// ═══════════════════════════════════════════════════════
function renderSectionOffscreen(sec,secIdx,hoverTile){
  // Find bounding box in screen space
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const t of sec.tiles){
    const et=effTile(t,sec);
    const{x:sx,y:sy}=iso(et.x,et.y,et.z,OX,OY);
    const hw=TW/2,depth=TD+(t.type==='wall'?TD*2:0);
    minX=Math.min(minX,sx-hw-2); maxX=Math.max(maxX,sx+hw+2);
    minY=Math.min(minY,sy-TH/2-2); maxY=Math.max(maxY,sy+TH/2+depth+2);
  }
  const pad=20;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const ow=Math.ceil(maxX-minX),oh=Math.ceil(maxY-minY);

  const off=document.createElement('canvas');
  off.width=ow; off.height=oh;
  const oc=off.getContext('2d');

  // Sort tiles painter-order
  const sorted=[...sec.tiles].sort((a,b)=>(a.x+a.y+(a.z||0)*.01)-(b.x+b.y+(b.z||0)*.01));

  for(const t of sorted){
    const et=effTile(t,sec);
    const{x:sx,y:sy}=iso(et.x,et.y,et.z,OX,OY);
    const lx=sx-minX, ly=sy-minY;
    const isHov=hoverTile&&hoverTile.x===et.x&&hoverTile.y===et.y;
    const[pt,pl,pr]=palFor(secIdx,t.type,isHov);
    const hw=TW/2,hh=TH/2;
    const depth=t.type==='wall'?TD*3:TD;

    oc.fillStyle=pt;
    oc.beginPath();oc.moveTo(lx,ly-hh);oc.lineTo(lx+hw,ly);
    oc.lineTo(lx,ly+hh);oc.lineTo(lx-hw,ly);oc.closePath();oc.fill();

    oc.fillStyle=pl;
    oc.beginPath();oc.moveTo(lx-hw,ly);oc.lineTo(lx,ly+hh);
    oc.lineTo(lx,ly+hh+depth);oc.lineTo(lx-hw,ly+depth);oc.closePath();oc.fill();

    oc.fillStyle=pr;
    oc.beginPath();oc.moveTo(lx,ly+hh);oc.lineTo(lx+hw,ly);
    oc.lineTo(lx+hw,ly+depth);oc.lineTo(lx,ly+hh+depth);oc.closePath();oc.fill();

    oc.strokeStyle='rgba(0,0,0,0.18)';oc.lineWidth=1;
    oc.beginPath();oc.moveTo(lx,ly-hh);oc.lineTo(lx+hw,ly);
    oc.lineTo(lx,ly+hh);oc.lineTo(lx-hw,ly);oc.closePath();oc.stroke();

    if(t.type==='goal'){
      oc.font='20px serif';oc.textAlign='center';
      oc.fillText('☕',lx,ly-hh-2);
    }
  }

  // Compute pivot in screen space, then relative to offscreen canvas
  const pivot=sec.pivot||{x:sec.tiles[0].x,y:sec.tiles[0].y};
  const{x:pvx,y:pvy}=iso(pivot.x,pivot.y,(sec.tiles[0]?.z||0)+(sec.zOffset||0),OX,OY);

  return{off,offX:minX,offY:minY,pivotScreenX:pvx,pivotScreenY:pvy};
}

// ═══════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1410';ctx.fillRect(0,0,W,H);
  if(!game.level)return;

  const lv=game.level;

  // Build sorted tile list across all sections
  let allTiles=[];
  for(let si=0;si<lv.sections.length;si++){
    const sec=lv.sections[si];
    // Skip sections currently being spin-animated
    if(game.rotAnim&&game.rotAnim.secId===sec.id)continue;
    for(const t of sec.tiles){
      const et=effTile(t,sec);
      allTiles.push({...et,secIdx:si,secId:sec.id,origType:t.type});
    }
  }
  allTiles.sort((a,b)=>(a.x+a.y+(a.z||0)*.01)-(b.x+b.y+(b.z||0)*.01));

  for(const tile of allTiles){
    const isHov=!game.walking&&game.hover&&game.hover.x===tile.x&&game.hover.y===tile.y;
    const[pt,pl,pr]=palFor(tile.secIdx,tile.origType,isHov);
    drawBlockColored(tile.x,tile.y,tile.z||0,pt,pl,pr);
    if(tile.origType==='goal'){
      const{x:sx,y:sy}=iso(tile.x,tile.y,tile.z||0,OX,OY);
      ctx.font='20px serif';ctx.textAlign='center';
      ctx.fillText('☕',sx,sy-TH/2-2);
    }
  }

  // Draw rotating section on top via offscreen canvas (spun around pivot)
  if(game.rotAnim){
    const{secId,angle,secIdx}=game.rotAnim;
    const sec=lv.sections.find(s=>s.id===secId);
    if(sec){
      const{off,offX,offY,pivotScreenX,pivotScreenY}=renderSectionOffscreen(sec,secIdx,null);
      ctx.save();
      ctx.translate(pivotScreenX,pivotScreenY);
      ctx.rotate(angle);
      ctx.translate(-pivotScreenX,-pivotScreenY);
      ctx.drawImage(off,offX,offY);
      ctx.restore();
    }
  }

  // Path preview dots
  if(game.previewPath){
    for(const step of game.previewPath){
      const pz=tileZ(step.x,step.y);
      const{x:sx,y:sy}=iso(step.x,step.y,pz,OX,OY);
      ctx.fillStyle='rgba(200,169,122,.4)';
      ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);ctx.fill();
    }
  }

  // Section control buttons
  game.buttons=[];
  for(let si=0;si<lv.sections.length;si++){
    const sec=lv.sections[si];
    if(!sec.rotatable&&!sec.elevatable)continue;
    if(!sec.tiles.length)continue;
    // If rotating, don't show buttons for that section mid-animation
    if(game.rotAnim&&game.rotAnim.secId===sec.id)continue;

    const xs=sec.tiles.map(t=>t.x),ys=sec.tiles.map(t=>t.y);
    const cx2=xs.reduce((a,b)=>a+b,0)/xs.length;
    const cy2=ys.reduce((a,b)=>a+b,0)/ys.length;
    const maxZ=Math.max(...sec.tiles.map(t=>(t.z||0)))+(sec.zOffset||0);
    const{x:bx,y:by}=iso(cx2,cy2,maxZ+1.6,OX,OY);

    if(sec.rotatable){
      const hov=game.hovBtn&&game.hovBtn.secId===sec.id&&game.hovBtn.type==='rot';
      const col=SEC_PALETTES[(si)%SEC_PALETTES.length].t;
      drawBtn(bx,by,'↻',hov,col);
      game.buttons.push({cx:bx,cy:by,r:22,secId:sec.id,type:'rot'});
    }
    if(sec.elevatable){
      const canUp=(sec.zOffset||0)<(sec.zMax||2);
      const canDown=(sec.zOffset||0)>(sec.zMin||0);
      const col=SEC_PALETTES[(si)%SEC_PALETTES.length].t;
      if(canUp){
        const hov=game.hovBtn&&game.hovBtn.secId===sec.id&&game.hovBtn.type==='up';
        drawBtn(bx+28,by-10,'▲',hov,col);
        game.buttons.push({cx:bx+28,cy:by-10,r:20,secId:sec.id,type:'up'});
      }
      if(canDown){
        const hov=game.hovBtn&&game.hovBtn.secId===sec.id&&game.hovBtn.type==='down';
        drawBtn(bx-28,by-10,'▼',hov,col);
        game.buttons.push({cx:bx-28,cy:by-10,r:20,secId:sec.id,type:'down'});
      }
    }
  }

  // Player
  let drawX,drawY;
  if(game._walkX!=null){drawX=game._walkX;drawY=game._walkY;}
  else{const p=iso(game.playerX,game.playerY,game.playerZ,OX,OY);drawX=p.x;drawY=p.y;}
  drawPlayer(drawX,drawY,game.playerBobY);
}

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
const game={
  level:null,graph:null,levelIdx:0,
  playerX:0,playerY:0,playerZ:0,playerBobY:0,
  walking:false,animating:false,
  hover:null,hovBtn:null,previewPath:null,
  buttons:[],elevSec:null,
  rotAnim:null,   // { secId, angle, secIdx } — live rotation animation state
  _walkX:null,_walkY:null,
};

function loadLevel(idx){
  const lv=JSON.parse(JSON.stringify(LEVELS[idx]));
  game.levelIdx=idx;
  game.level=lv;
  game.graph=buildGraph(lv);
  game.playerX=lv.playerStart.x;
  game.playerY=lv.playerStart.y;
  game.playerZ=lv.playerStart.z||0;
  game.playerBobY=0;
  game.walking=false;game.animating=false;
  game.hover=null;game.hovBtn=null;game.previewPath=null;
  game.elevSec=null;game.rotAnim=null;
  game._walkX=null;game._walkY=null;
  recomputeOrigin();
  document.getElementById('level-title').textContent=`Level ${idx+1} — ${lv.name}`;
  document.getElementById('level-counter').textContent=`${idx+1} / 5`;
  render();
}

function nextLevel(){
  document.getElementById('overlay').classList.remove('show');
  const n=game.levelIdx+1;
  if(n<LEVELS.length)loadLevel(n);
}

function getPlayerZ(){
  for(const sec of game.level.sections){
    const t=sec.tiles.find(t=>t.x===game.playerX&&t.y===game.playerY&&t.type!=='wall');
    if(t)return(t.z||0)+(sec.zOffset||0);
  }
  return game.playerZ;
}

function tileZ(x,y){
  for(const sec of game.level.sections){
    const t=sec.tiles.find(t=>t.x===x&&t.y===y&&t.type!=='wall');
    if(t)return(t.z||0)+(sec.zOffset||0);
  }
  return 0;
}

// ═══════════════════════════════════════════════════════
//  ROTATION ANIMATION
//  Spins the section's offscreen image 90° around the
//  iso-projected pivot point, then snaps to new grid state.
// ═══════════════════════════════════════════════════════
function rotateSection(secId){
  if(game.animating||game.walking)return;
  const lv=game.level;
  const sec=lv.sections.find(s=>s.id===secId);
  if(!sec||!sec.rotatable)return;

  const secIdx=lv.sections.indexOf(sec);
  game.animating=true;

  // Target angle in screen space.
  // iso rotation of 90° in grid space = 90° clockwise in screen space.
  const TARGET=Math.PI/2;
  const FRAMES=22;
  let frame=0;

  // Show the section spinning in place
  game.rotAnim={secId,angle:0,secIdx};

  const tick=()=>{
    frame++;
    const t=frame/FRAMES;
    // Ease in-out cubic
    const e=t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
    game.rotAnim.angle=TARGET*e;
    render();
    if(frame<FRAMES){
      requestAnimationFrame(tick);
    }else{
      // Commit: advance rotation state, rebuild graph
      const steps=sec.rotationSteps||4;
      sec.currentRotation=((sec.currentRotation||0)+1+steps)%steps;
      game.rotAnim=null;
      game.graph=buildGraph(lv);
      game.playerZ=getPlayerZ();
      game.animating=false;
      render();
    }
  };
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════
//  ELEVATOR ANIMATION
// ═══════════════════════════════════════════════════════
function moveElevator(secId,direction){
  if(game.animating||game.walking)return;
  const sec=game.level.sections.find(s=>s.id===secId);
  if(!sec||!sec.elevatable)return;
  const zMin=sec.zMin||0,zMax=sec.zMax||2;
  const newZ=(sec.zOffset||0)+direction;
  if(newZ<zMin||newZ>zMax)return;

  game.animating=true;game.elevSec=secId;
  const startZ=sec.zOffset||0;
  const FRAMES=20;let frame=0;

  const tick=()=>{
    frame++;
    const t=frame/FRAMES;
    const e=t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
    sec.zOffset=startZ+direction*e;
    const onElev=sec.tiles.some(t=>t.x===game.playerX&&t.y===game.playerY);
    if(onElev){
      const bt=sec.tiles.find(t=>t.x===game.playerX&&t.y===game.playerY);
      game.playerZ=(bt?.z||0)+sec.zOffset;
    }
    render();
    if(frame<FRAMES){requestAnimationFrame(tick);}
    else{
      sec.zOffset=newZ;
      game.graph=buildGraph(game.level);
      game.playerZ=getPlayerZ();
      game.animating=false;game.elevSec=null;
      render();
    }
  };
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════
//  WALK ANIMATION
// ═══════════════════════════════════════════════════════
function walkTo(path){
  if(!path||path.length<2)return;
  game.walking=true;game.previewPath=null;
  const steps=path.slice(1);

  const doStep=()=>{
    if(!steps.length){game.walking=false;checkGoal();render();return;}
    const next=steps.shift();
    const destZ=tileZ(next.x,next.y);
    const{x:x1,y:y1}=iso(game.playerX,game.playerY,game.playerZ,OX,OY);
    const{x:x2,y:y2}=iso(next.x,next.y,destZ,OX,OY);
    const FRAMES=13;let frame=0;

    const anim=()=>{
      frame++;
      const t=frame/FRAMES;
      const e=t<.5?2*t*t:-1+(4-2*t)*t;
      game._walkX=x1+(x2-x1)*e;
      game._walkY=y1+(y2-y1)*e;
      game.playerBobY=Math.sin(t*Math.PI)*-10;
      render();
      if(frame<FRAMES){requestAnimationFrame(anim);}
      else{
        game.playerX=next.x;game.playerY=next.y;game.playerZ=destZ;
        game.playerBobY=0;game._walkX=null;game._walkY=null;
        doStep();
      }
    };
    requestAnimationFrame(anim);
  };
  doStep();
}

// ═══════════════════════════════════════════════════════
//  WIN
// ═══════════════════════════════════════════════════════
function checkGoal(){
  const g=game.level.goal;
  if(game.playerX===g.x&&game.playerY===g.y){
    setTimeout(()=>{
      const isLast=game.levelIdx>=LEVELS.length-1;
      document.getElementById('ov-msg').textContent=
        isLast?'You savoured every drop. The end.':'The coffee beckons…';
      document.getElementById('ov-btn').style.display=isLast?'none':'block';
      document.getElementById('overlay').classList.add('show');
    },500);
  }
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
function btnAt(cx,cy){
  for(const btn of game.buttons){
    const dx=cx-btn.cx,dy=cy-btn.cy;
    if(dx*dx+dy*dy<=btn.r*btn.r)return btn;
  }
  return null;
}

function gridHitAt(cx,cy){
  if(!game.level)return null;
  let all=[];
  for(let si=0;si<game.level.sections.length;si++){
    const sec=game.level.sections[si];
    for(const t of sec.tiles){
      if(t.type==='wall')continue;
      const et=effTile(t,sec);
      all.push({...et,secIdx:si});
    }
  }
  all.sort((a,b)=>(b.x+b.y+(b.z||0)*.01)-(a.x+a.y+(a.z||0)*.01));
  for(const t of all){
    if(hitTile(cx,cy,t.x,t.y,t.z||0,OX,OY))return{x:t.x,y:t.y};
  }
  return null;
}

function onPointerDown(cx,cy){
  if(game.animating)return;
  const btn=btnAt(cx,cy);
  if(btn){
    if(btn.type==='rot')  rotateSection(btn.secId);
    if(btn.type==='up')   moveElevator(btn.secId,1);
    if(btn.type==='down') moveElevator(btn.secId,-1);
    return;
  }
  if(game.walking)return;
  const tile=gridHitAt(cx,cy);
  if(!tile)return;
  const path=game.graph.bfs(game.playerX,game.playerY,tile.x,tile.y);
  if(path)walkTo(path);
}

function onPointerMove(cx,cy){
  if(game.walking||game.animating){
    game.hover=null;game.hovBtn=null;render();return;
  }
  const btn=btnAt(cx,cy);
  game.hovBtn=btn||null;
  if(!btn){
    const tile=gridHitAt(cx,cy);
    game.hover=tile||null;
    game.previewPath=tile?game.graph.bfs(game.playerX,game.playerY,tile.x,tile.y):null;
  }else{game.hover=null;game.previewPath=null;}
  render();
}

canvas.addEventListener('mousedown',e=>{e.preventDefault();onPointerDown(e.clientX,e.clientY);});
canvas.addEventListener('mousemove',e=>onPointerMove(e.clientX,e.clientY));
canvas.addEventListener('mouseleave',()=>{game.hover=null;game.hovBtn=null;game.previewPath=null;render();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];onPointerDown(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0];onPointerMove(t.clientX,t.clientY);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();game.hover=null;game.hovBtn=null;render();},{passive:false});

document.addEventListener('keydown',e=>{
  if(!game.level||game.animating)return;
  const secs=game.level.sections;
  if(e.key==='r'||e.key==='R'){const s=secs.find(s=>s.rotatable);if(s)rotateSection(s.id);}
  if(e.key==='ArrowUp'){const s=secs.find(s=>s.elevatable);if(s)moveElevator(s.id,1);}
  if(e.key==='ArrowDown'){const s=secs.find(s=>s.elevatable);if(s)moveElevator(s.id,-1);}
});

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
window.addEventListener('load',()=>{
  resize();
  loadLevel(0);
  document.getElementById('loading').style.display='none';
});
</script>
</body>
